# Railway / Nixpacks build config.
#
# Adds the system binaries the orchestrator needs at runtime:
#   - git: for the codebase-import "Clone GitHub" path (`git clone`)
#   - psmisc: provides `fuser`, used by startServer's port-clear logic
#     before binding (without this, EADDRINUSE recovery silently no-ops)
#   - lsof: secondary fallback alongside fuser for finding port holders
#   - python311 + python311Packages.pip: Phase 1.x polyglot bridge — ops
#     wedge tools (Slack bots, Snowflake queries, ETL scripts) are
#     Python-shaped. Without this `start_server` for `python app.py`
#     fails with "python: command not found" on the runtime image.
#   - go_1_22: same rationale for Go projects (CLI tools, small
#     long-running services). Java/C/Ruby deferred per plan §1.x — add
#     on customer-driven demand only.
#
# IMPORTANT: must use `nixPkgs` (not `aptPkgs`). Railway's nixpacks runtime
# image is Nix-based — apt packages install during build but aren't present
# at runtime, which is why our previous aptPkgs entry silently failed.
# `nixPkgs` packages are bundled into the runtime via the Nix store.
#
# The `"..."` entry preserves nixpacks's auto-detected packages (node, npm,
# etc.) — without it, this list REPLACES the inherited set, which would
# break the build.
#
# We deliberately don't list `cacert` here. Git already depends on it
# transitively, and listing it explicitly drags in a SECOND nss-cacert
# derivation (different store hash). The Nix profile builder then fails
# with "conflict for ca-no-trust-rules-bundle.crt" and the build dies
# halfway through `nix-env -if`.

[phases.setup]
nixPkgs = [
  "...",
  "git",
  "psmisc",
  "lsof",
  "python311",
  "python311Packages.pip",
  "go_1_22",
]
